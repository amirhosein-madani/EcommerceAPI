{% extends "base.html" %}

{% block title %}تغییر رمز عبور{% endblock title %}

{% block content %}

<div class="container content-space-2 content-space-lg-3">
    <div class="w-md-50 w-lg-40 mx-md-auto">

        <div class="text-center mb-5">
            <h1 class="h2">تغییر رمز عبور</h1>
            <p class="text-muted">
                رمز عبور جدید خود را وارد کرده و آن را تأیید کنید.
            </p>
        </div>

        <div class="card card-lg">
            <div class="card-body">

                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label" for="{{ form.password.id_for_label }}">
                            رمز عبور جدید
                        </label>

                        <div class="input-group">
                            {{ form.password }}
                            <button
                                class="btn btn-outline-secondary"
                                type="button"
                                id="togglePassword">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" for="{{ form.confirm_password.id_for_label }}">
                            تکرار رمز عبور
                        </label>

                        <div class="input-group">
                            {{ form.confirm_password }}
                            <button
                                class="btn btn-outline-secondary"
                                type="button"
                                id="toggleConfirmPassword">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            تغییر رمز عبور
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    function setupPasswordToggle(buttonId, inputId) {
        const button = document.getElementById(buttonId);
        const input = document.getElementById(inputId);
        const icon = button.querySelector("i");

        button.addEventListener("click", function () {
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("bi-eye");
                icon.classList.add("bi-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
            }
        });
    }

    setupPasswordToggle(
        "togglePassword",
        "{{ form.password.id_for_label }}"
    );

    setupPasswordToggle(
        "toggleConfirmPassword",
        "{{ form.confirm_password.id_for_label }}"
    );

});
</script>

{% endblock content %}
