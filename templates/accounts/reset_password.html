{% extends "base.html" %}

{% block title %}تغییر رمز عبور{% endblock title %}

{% block content %}

<div class="container content-space-2 content-space-lg-3">
    <div class="w-md-50 w-lg-40 mx-md-auto">

        <div class="text-center mb-5">
            <h1 class="h2">تغییر رمز عبور</h1>
            <p class="text-muted">
                رمز عبور جدید خود را وارد کرده و آن را تأیید کنید.
            </p>
        </div>

        <div class="card card-lg">
            <div class="card-body">

                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label" for="{{ form.password.id_for_label }}">
                            رمز عبور جدید
                        </label>

                        {{ form.password }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label" for="{{ form.confirm_password.id_for_label }}">
                            تکرار رمز عبور
                        </label>

                        {{ form.confirm_password }}
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            تغییر رمز عبور
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

{% endblock content %}
